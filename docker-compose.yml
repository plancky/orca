x-app-environment: &app-environment
  DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/workspace_orchestrator
  REDIS_URL: redis://redis:6379/0
  SECRET_KEY: ${SECRET_KEY:-dev-change-me}
  EMBED_MODE: ${EMBED_MODE:-fake}
  GEMINI_STUDIO_API_KEY: ${GEMINI_STUDIO_API_KEY:-}
  INFERENCE_BASE_URL: ${INFERENCE_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai/}
  CHAT_MODEL: ${CHAT_MODEL:-gemini-2.5-flash}
  EMBED_MODEL: ${EMBED_MODEL:-gemini-embedding-001}

# One multi-stage image (see ./Dockerfile), three roles differing only by
# `command:`. Built once, tagged, and reused by api/worker/beat.
x-app-base: &app-base
  build:
    context: .
  image: workspace-orchestrator:local
  environment: *app-environment
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: workspace_orchestrator
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d workspace_orchestrator"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory-policy", "noeviction"]
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # API — I/O-bound (enqueues + reads task rows); 2 uvicorn workers.
  api:
    <<: *app-base
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --workers 2
    ports:
      - "${API_HOST_PORT:-8000}:8000"

  # Celery worker — heavy tenant. Low concurrency guards against any sync call
  # (Argon2, blocking I/O) pinning a prefork child + RAM x children.
  worker:
    <<: *app-base
    command: celery -A backend.workers.celery_app worker --pool=prefork --concurrency=2 --loglevel=info
    # No HTTP surface — the image's API /health probe never applies here.
    healthcheck:
      test: ["CMD-SHELL", "celery -A backend.workers.celery_app inspect ping -t 5 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Celery beat — exactly ONE, never scale. Two beats => double-fired 15-min
  # sync => duplicate embeds + free-tier rate-limit burn.
  beat:
    <<: *app-base
    command: celery -A backend.workers.celery_app beat --loglevel=info
    # Beat has no natural probe (PLAN.md l.834-835); disable the inherited
    # API /health check rather than report a permanent false "unhealthy".
    healthcheck:
      disable: true

volumes:
  pgdata:
